<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 扫码登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card rounded-3xl p-8 max-w-sm w-full">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">✅</span>
            </div>
            <h1 class="text-xl font-bold text-gray-800">{{ system_name }}</h1>
            <p class="text-gray-500 text-sm mt-2">扫码登录 · 请输入学号和姓名</p>
        </div>

        <form id="scan-login-form" class="space-y-4">
            <div>
                <label for="student_id" class="block text-sm font-medium text-gray-700 mb-2">
                    🔢 学号
                </label>
                <input 
                    type="text" 
                    id="student_id" 
                    placeholder="请输入学号" 
                    required
                    class="input-field w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
                >
            </div>
            <div>
                <label for="student_name" class="block text-sm font-medium text-gray-700 mb-2">
                    👤 姓名
                </label>
                <input 
                    type="text" 
                    id="student_name" 
                    placeholder="请输入姓名" 
                    required
                    class="input-field w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
                >
            </div>
            <button 
                type="submit" 
                class="btn-primary w-full py-4 rounded-xl text-white font-semibold text-lg shadow-lg"
            >
                🚀 确认登录
            </button>
        </form>

        <div id="status-message" class="mt-4 text-center text-sm"></div>
    </div>

    <script>
        document.getElementById('scan-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var studentId = document.getElementById('student_id').value;
            var studentName = document.getElementById('student_name').value;
            
            if (!studentId || !studentName) {
                document.getElementById('status-message').innerHTML = '<span class="text-red-600">请填写完整信息</span>';
                return;
            }

            var btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '⏳ 登录中...';

            fetch('/scan_login/{{ code }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    student_id: studentId,
                    student_name: studentName
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('status-message').innerHTML = '<span class="text-green-600">✅ 登录成功！</span>';
                    setTimeout(function() {
                        window.close();
                    }, 1500);
                } else {
                    document.getElementById('status-message').innerHTML = '<span class="text-red-600">❌ 登录失败，请重试</span>';
                    btn.disabled = false;
                    btn.innerHTML = '🚀 确认登录';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('status-message').innerHTML = '<span class="text-red-600">❌ 网络错误</span>';
                btn.disabled = false;
                btn.innerHTML = '🚀 确认登录';
            });
        });
    </script>
</body>
</html>
