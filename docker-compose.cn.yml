# 国内 Docker Hub 镜像代理（无需登录）
# 用法: docker compose -f docker-compose.yml -f docker-compose.cn.yml up -d --build

services:
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.25-alpine

  certbot:
    image: docker.m.daocloud.io/certbot/certbot:latest
